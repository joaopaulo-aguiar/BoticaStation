# BoticaStation v0.43 — AppSync GraphQL Schema
# Region: sa-east-1 | API ID: hs5qzjtrwrgctclh2rv7yp76lq
# Auth: Cognito User Pool (sa-east-1_0ySBjVR2a)

schema {
	query: Query
	mutation: Mutation
}

# ── Templates ─────────────────────────────────────────────────────────────────

type TemplateSummary {
	name: String!
	displayName: String!
	createdAt: AWSDateTime
	updatedAt: AWSDateTime
}

type TemplateDetail {
	name: String!
	displayName: String!
	subject: String!
	html: String!
	text: String!
	testData: AWSJSON
}

type BackupVersion {
	version: String!
	key: String!
	lastModified: AWSDateTime!
	size: Int!
}

type SaveTemplateResult {
	name: String!
	updatedAt: AWSDateTime!
}

type DuplicateTemplateResult {
	name: String!
}

type SendTestEmailResult {
	messageId: String!
}

type VerifiedIdentity {
	identity: String!
	type: String!
	sendingEnabled: Boolean!
	verificationStatus: String!
}

input SaveTemplateInput {
	name: String!
	displayName: String!
	subject: String!
	html: String!
	text: String!
	testData: AWSJSON
}

# ── Contacts ──────────────────────────────────────────────────────────────────

type CashbackInfo {
	currentBalance: Float!
	lifetimeEarned: Float!
	expiryDate: String
}

type EcommerceInfo {
	paidOrders: Int!
	revenue: Float!
	avgTicket: Float!
	lastPurchaseAt: AWSDateTime
	abandonedCarts: Int!
	abandonedCartValue: Float!
}

type ContactStats {
	emailSends: Int!
	emailDeliveries: Int!
	emailOpens: Int!
	emailClicks: Int!
	emailBounces: Int!
	emailComplaints: Int!
	smsSends: Int!
	smsDeliveries: Int!
}

type Contact {
	# Identificação
	id: ID!
	email: String!
	phone: String
	fullName: String!
	# Classificação
	lifecycleStage: String!
	cashbackInfo: CashbackInfo
	ecommerceInfo: EcommerceInfo
	legalBasis: String
	tags: [String!]!
	# Metadados
	createdAt: AWSDateTime!
	updatedAt: AWSDateTime
	source: String!
	status: String!
	# Saúde dos Canais
	emailStatus: String
	emailFailReason: String
	phoneStatus: String
	# Contadores (atualizados atomicamente pela Lambda SES/SMS)
	stats: ContactStats
	# Auditoria
	createdBy: String
	updatedBy: String
}

type ContactListResult {
	items: [Contact!]!
	nextToken: String
	totalCount: Int
}

type LifecycleCounts {
	lead: Int!
	subscriber: Int!
	customer: Int!
}

type ContactCounters {
	total: Int!
	byLifecycle: LifecycleCounts!
	updatedAt: AWSDateTime
}

type ImportResult {
	success: Int!
	failed: Int!
	errors: [String!]
}

input CreateContactInput {
	email: String!
	phone: String
	fullName: String!
	lifecycleStage: String
	cashbackBalance: Float
	tags: [String!]
	source: String
	emailStatus: String
	phoneStatus: String
}

input UpdateContactInput {
	fullName: String
	email: String
	phone: String
	lifecycleStage: String
	tags: [String!]
	status: String
	emailStatus: String
	emailFailReason: String
	phoneStatus: String
}

input ContactFilterInput {
	lifecycleStage: String
	status: String
	tag: String
	search: String
	emailStatus: String
	phoneStatus: String
}

input ContactSortInput {
	field: ContactSortField
	direction: SortDirection
}

enum ContactSortField {
	CREATED_AT
	FULL_NAME
	EMAIL
	LIFECYCLE_STAGE
}

enum SortDirection {
	ASC
	DESC
}

# ── Contact Events ────────────────────────────────────────────────────────────
# Tabela: ContactEvent | Data Source: ContactEventTable
# PK = CONTACT#{contactId}, SK = EVENT#{timestamp}#{messageId}
# Stats item: PK = CONTACT#{contactId}, SK = EMAIL_STATS

type ContactEvent {
	contactId: ID!
	eventId: String!
	channel: String!
	eventType: String!
	details: String
	campaignId: String
	campaignName: String
	subject: String
	createdAt: AWSDateTime!
}

type ContactEventListResult {
	items: [ContactEvent!]!
	nextToken: String
}

input ContactEventFilterInput {
	channel: String
	eventType: String
}

# ── Segments ──────────────────────────────────────────────────────────────────
# Tabela: Config_Table | Data Source: ConfigTable
# PK = SEGMENT, SK = SEGMENT#{segmentId}

type SegmentCondition {
	field: String!
	operator: String!
	value: String!
}

type Segment {
	id: ID!
	name: String!
	description: String
	conditionLogic: String!
	conditions: [SegmentCondition!]!
	contactCount: Int
	lastCountAt: AWSDateTime
	createdAt: AWSDateTime!
	updatedAt: AWSDateTime
	createdBy: String
}

input SegmentConditionInput {
	field: String!
	operator: String!
	value: String!
}

input CreateSegmentInput {
	name: String!
	description: String
	conditionLogic: String
	conditions: [SegmentConditionInput!]!
}

input UpdateSegmentInput {
	name: String
	description: String
	conditionLogic: String
	conditions: [SegmentConditionInput!]
}

# ── SES / Settings ────────────────────────────────────────────────────────────

type SesAccountStatus {
	sendingEnabled: Boolean!
	inSandbox: Boolean!
	max24HourSend: Float!
	sentLast24Hours: Float!
	maxSendRate: Float!
	configSets: Int!
}

type SenderProfile {
	id: ID!
	name: String!
	email: String!
	replyTo: String
	isDefault: Boolean!
	createdAt: AWSDateTime!
}

input CreateSenderProfileInput {
	name: String!
	email: String!
	replyTo: String
	isDefault: Boolean
}

# ── Campaigns ─────────────────────────────────────────────────────────────────

type CampaignMetrics {
	sent: Int!
	delivered: Int!
	opened: Int!
	clicked: Int!
	bounced: Int!
	complained: Int!
	unsubscribed: Int!
}

type Campaign {
	id: ID!
	name: String!
	subject: String!
	templateName: String!
	senderProfileId: String!
	recipientType: String!
	recipientFilter: String
	segmentId: String
	status: String!
	scheduledAt: AWSDateTime
	sentAt: AWSDateTime
	completedAt: AWSDateTime
	metrics: CampaignMetrics
	configurationSet: String
	scheduleArn: String
	timezone: String
	utmParams: AWSJSON
	estimatedRecipients: Int
	createdAt: AWSDateTime!
	updatedAt: AWSDateTime
	createdBy: String
}

input CreateCampaignInput {
	name: String!
	subject: String!
	templateName: String!
	senderProfileId: String!
	recipientType: String
	recipientFilter: String
	segmentId: String
	scheduledAt: AWSDateTime
	configurationSet: String
	utmParams: AWSJSON
}

input UpdateCampaignInput {
	name: String
	subject: String
	templateNameName: String
	senderProfileId: String
	recipientType: String
	recipientFilter: String
	segmentId: String
	scheduledAt: AWSDateTime
	configurationSet: String
	utmParams: AWSJSON
}

# ── Campaign Settings (EventBridge Scheduler) ─────────────────────────────────

type CampaignSettings {
	timezone: String!
	scheduleGroupName: String!
	defaultUtmSource: String
	defaultUtmMedium: String
}

input UpdateCampaignSettingsInput {
	timezone: String
	scheduleGroupName: String
	defaultUtmSource: String
	defaultUtmMedium: String
}

# ── Cognito ───────────────────────────────────────────────────────────────────

type CognitoUser {
	username: String!
	email: String!
	name: String
	status: String!
	enabled: Boolean!
	groups: [String!]!
	createdAt: AWSDateTime!
	updatedAt: AWSDateTime
}

type CognitoGroup {
	name: String!
	description: String
	precedence: Int
	createdAt: AWSDateTime!
	updatedAt: AWSDateTime
}

input CreateUserInput {
	email: String!
	name: String!
	temporaryPassword: String!
	group: String!
}

input UpdateUserInput {
	name: String
	enabled: Boolean
}

# ── Queries ───────────────────────────────────────────────────────────────────

type Query {
	# Templates
	listTemplates: [TemplateSummary!]!
	getTemplate(name: String!): TemplateDetail!
	listTemplateVersions(name: String!): [BackupVersion!]!
	getTemplateVersion(name: String!, version: String!): TemplateDetail!
	# Contacts
	listContacts(pageSize: Int, nextToken: String, filter: ContactFilterInput, sort: ContactSortInput): ContactListResult!
	getContact(id: ID!): Contact
	findContactByEmail(email: String!): Contact
	findContactByPhone(phone: String!): Contact
	getContactCounters: ContactCounters!
	# Contact Events
	listContactEvents(contactId: ID!, limit: Int, nextToken: String, filter: ContactEventFilterInput): ContactEventListResult!
	# Segments
	listSegments: [Segment!]!
	getSegment(id: ID!): Segment
	previewSegmentContacts(conditions: [SegmentConditionInput!]!, conditionLogic: String, search: String, pageSize: Int, nextToken: String): ContactListResult!
	# SES
	listVerifiedIdentities: [VerifiedIdentity!]!
	getSesAccountStatus: SesAccountStatus!
	listSenderProfiles: [SenderProfile!]!
	listConfigurationSets: [String!]!
	getDefaultConfigurationSet: String
	# Campaigns
	listCampaigns: [Campaign!]!
	getCampaign(id: ID!): Campaign
	getCampaignSettings: CampaignSettings
	# Cognito
	listUsers: [CognitoUser!]!
	listGroups: [CognitoGroup!]!
}

# ── Mutations ─────────────────────────────────────────────────────────────────

type Mutation {
	# Templates
	saveTemplate(input: SaveTemplateInput!): SaveTemplateResult!
	deleteTemplate(name: String!): Boolean!
	duplicateTemplate(sourceName: String!, newName: String!, newDisplayName: String!): DuplicateTemplateResult!
	sendTestEmail(templateName: String!, toAddress: String!, fromAddress: String, testData: AWSJSON, configurationSet: String, tags: AWSJSON): SendTestEmailResult!
	# Contacts
	createContact(input: CreateContactInput!): Contact!
	updateContact(id: ID!, input: UpdateContactInput!): Contact!
	deleteContact(id: ID!): Boolean!
	importContacts(inputs: [CreateContactInput!]!): ImportResult!
	# Segments
	createSegment(input: CreateSegmentInput!): Segment!
	updateSegment(id: ID!, input: UpdateSegmentInput!): Segment!
	deleteSegment(id: ID!): Boolean!
	# SES
	requestEmailVerification(email: String!): Boolean!
	verifyDomain(domain: String!): [String!]!
	deleteVerifiedIdentity(identity: String!): Boolean!
	createSenderProfile(input: CreateSenderProfileInput!): SenderProfile!
	deleteSenderProfile(id: ID!): Boolean!
	setDefaultConfigurationSet(name: String): Boolean!
	# Campaigns
	createCampaign(input: CreateCampaignInput!): Campaign!
	updateCampaign(id: ID!, input: UpdateCampaignInput!): Campaign!
	deleteCampaign(id: ID!): Boolean!
	scheduleCampaign(id: ID!, scheduledAt: AWSDateTime!): Campaign!
	rescheduleCampaign(id: ID!, scheduledAt: AWSDateTime!): Campaign!
	sendCampaign(id: ID!): Campaign!
	pauseCampaign(id: ID!): Campaign!
	resumeCampaign(id: ID!): Campaign!
	cancelCampaign(id: ID!): Campaign!
	duplicateCampaign(id: ID!): Campaign!
	updateCampaignSettings(input: UpdateCampaignSettingsInput!): CampaignSettings!
	# Cognito
	createUser(input: CreateUserInput!): CognitoUser!
	updateUser(username: String!, input: UpdateUserInput!): CognitoUser!
	deleteUser(username: String!): Boolean!
	addUserToGroup(username: String!, group: String!): Boolean!
	removeUserFromGroup(username: String!, group: String!): Boolean!
	resetUserPassword(username: String!): Boolean!
}
